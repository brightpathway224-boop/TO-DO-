It helps to remember things
<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorful To-Do Calendar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #333;
    }header {
  text-align: center;
  padding: 20px;
  color: white;
  font-size: 24px;
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2 {
  margin-top: 0;
}

/* To-Do */
#taskInput {
  width: 70%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #ff6f61;
  color: white;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #f0f0f0;
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

/* Calendar */
input[type="date"] {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* Images */
.images {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.images img {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 10px;
}

footer {
  text-align: center;
  padding: 10px;
  color: white;
}

  </style>
</head>
<body><header>✨ My Colorful Planner ✨</header><div class="container">  <div class="card">
    <h2>📝 To-Do List</h2>
    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>
    <ul id="taskList"></ul>
  </div>  <div class="card">
    <h2>📅 Calendar</h2>
    <input type="date">
  </div>  <div class="card">
    <h2>🌈 Gallery</h2>
    <div class="images">
      <img src="https://picsum.photos/200?1">
      <img src="https://picsum.photos/200?2">
      <img src="https://picsum.photos/200?3">
      <img src="https://picsum.photos/200?4">
    </div>
  </div></div><footer>Created by Jeevan V ❤️</footer><script>
  function addTask() {
    const input = document.getElementById('taskInput');
    const taskText = input.value.trim();

    if (taskText === '') return;

    const li = document.createElement('li');
    li.innerHTML = `${taskText} <span onclick="this.parentElement.remove()" style="cursor:pointer; color:red;">❌</span>`;

    document.getElementById('taskList').appendChild(li);
    input.value = '';
  }
</script></body>
</html>
